name: Clyra Backend CI/CD

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: clyra-backend

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: ./server

      - name: Run Tests
        run: npm test --if-present
        working-directory: ./server

  build:

    needs: test

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: ./server

      - name: Create Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-source
          path: server/

  docker:

    needs: build

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-source
          path: server

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
          -f server/Dockerfile \
          -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest \
          ./server

      - name: Push Docker Image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

  deploy:

    needs: docker

    runs-on: ubuntu-latest

    steps:

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/clyra-backend:latest

            docker stop clyra-backend || true
            docker rm clyra-backend || true

            docker run -d \
              --name clyra-backend \
              --restart unless-stopped \
              -p 3001:3001 \
              ${{ secrets.DOCKER_USERNAME }}/clyra-backend:latest   